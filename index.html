<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Multi Model Camera Realtime</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    margin: 0;
    background: #f5f5f5;
}

h2 {
    margin-top: 20px;
}

button {
    padding: 12px 18px;
    margin: 8px;
    font-size: 16px;
    cursor: pointer;
    border: 1px solid #333;
    background: white;
    border-radius: 6px;
}

button:hover {
    background: #eee;
}

#webcam-container {
    margin-top: 10px;
    height: 70vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

#webcam-container canvas {
    width: 50vw;
    height: 70vh;
    object-fit: cover;
    border: 3px solid black;
    border-radius: 10px;
}

#result {
    font-size: 26px;
    margin-top: 15px;
    font-weight: bold;
}
</style>
</head>

<body>

<h2>Nhận diện Nhịp (Realtime AI)</h2>

<!-- 3 NÚT MODEL -->
<button onclick="startModel('nhip1')">Nhịp 1</button>
<button onclick="startModel('nhip2')">Nhịp 2</button>
<button onclick="startModel('nhip4')">Nhịp 4</button>

<br>

<button onclick="stopCamera()">Stop</button>

<div id="webcam-container"></div>

<h2 id="result">Kết quả: ...</h2>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

<script>

let model = null;
let webcam = null;
let running = false;
let currentModel = "";

// ================= LOAD MODEL =================
async function loadModel(folder) {
    const modelURL = "./" + folder + "/model.json";
    const metadataURL = "./" + folder + "/metadata.json";

    console.log("Loading:", folder);

    model = await tmImage.load(modelURL, metadataURL);

    console.log("Loaded:", folder);
}

// ================= START MODEL =================
async function startModel(folder) {

    currentModel = folder;

    // STOP OLD SESSION
    running = false;
    if (webcam) {
        webcam.stop();
    }

    // LOAD MODEL
    await loadModel(folder);

    // START CAMERA
    webcam = new tmImage.Webcam(300, 300, true);

    await webcam.setup();
    await webcam.play();

    const container = document.getElementById("webcam-container");
    container.innerHTML = "";
    container.appendChild(webcam.canvas);

    running = true;

    loop();
}

// ================= STOP =================
function stopCamera() {
    running = false;

    if (webcam) {
        webcam.stop();
    }

    document.getElementById("result").innerText = "Kết quả: ...";
}

// ================= LOOP =================
async function loop() {
    if (!running) return;

    webcam.update();

    await predict(webcam.canvas);

    requestAnimationFrame(loop);
}

// ================= PREDICT =================
async function predict(image) {
    if (!model) return;

    const prediction = await model.predict(image);

    let best = prediction[0];

    prediction.forEach(p => {
        if (p.probability > best.probability) {
            best = p;
        }
    });

    document.getElementById("result").innerText =
        "MODEL: " + currentModel.toUpperCase() +
        " → " +
        best.className +
        " (" + (best.probability * 100).toFixed(1) + "%)";
}

</script>

</body>
</html>
